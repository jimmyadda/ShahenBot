<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <title>ShahenBot – Building Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 520px;">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h3 class="mb-3">Building Admin Login</h3>
        <p class="text-muted">
          Enter the email used in the building request and the verification code you received.
        </p>

        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('building_login_post') }}">
            <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" required>
            </div>

            <div class="mb-3">
            <label class="form-label">Verification Code</label>
            <input class="form-control" type="text" name="invite_code" required>
            </div>

          <button class="btn btn-primary w-100" type="submit">
            Login
          </button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
